site_name: Portfolio Manager
site_description: Personal Portfolio Work Orchestrator — documentation
site_author: Matt Briggs

docs_dir: site/src
site_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# Mermaid.js loaded via CDN so diagrams render inline without the mermaid2 plugin.
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Data Model: data-model.md
  - Design Patterns: design-patterns.md
  - Development Guide: development.md
  - Testing: testing.md
